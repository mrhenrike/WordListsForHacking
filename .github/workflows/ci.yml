name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Least-privilege: read-only for all jobs by default
permissions:
  contents: read

jobs:
  lint:
    name: Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 wfh.py wfh_modules/ \
            --max-line-length 120 \
            --extend-ignore E1,E2,E3,E4,E5,E7,W1,W2,W3,W5,W6,F401,F811,F841

  syntax-check:
    name: Syntax check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Compile all .py files
        run: |
          python -m py_compile wfh.py
          for f in wfh_modules/*.py; do
            echo "Compiling $f"
            python -m py_compile "$f"
          done

  build-check:
    name: Build package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package with twine
        run: twine check dist/*

      - name: Verify package hashes
        run: |
          echo "=== SHA256 hashes ==="
          sha256sum dist/*

  import-check:
    name: Import check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Verify module imports
        run: |
          python -c "
          import wfh_modules.domain_users
          import wfh_modules.ml_patterns
          import wfh_modules.pattern_engine
          import wfh_modules.thread_pool
          import wfh_modules.compute_backend
          import wfh_modules.hw_profiler
          import wfh_modules.corp_prefixes
          import wfh_modules.linkedin_search
          import wfh_modules.profiler
          import wfh_modules.dns_wordlist
          import wfh_modules.web_scraper
          import wfh_modules.analyzer
          import wfh_modules.charset_gen
          import wfh_modules.corp_profiler
          import wfh_modules.phone_gen
          import wfh_modules.sanitizer
          import wfh_modules.merger
          import wfh_modules.xor_crypto
          import wfh_modules.file_extractor
          import wfh_modules.ocr_extractor
          import wfh_modules.leet_permuter
          import wfh_modules.mangler
          import wfh_modules.default_creds
          import wfh_modules.isp_keygen
          import wfh_modules.seclists_trainer
          import wfh_modules.combiner
          import wfh_modules.password_dna
          import wfh_modules.pcfg_engine
          import wfh_modules.markov_engine
          import wfh_modules.kwalk_gen
          import wfh_modules.rulegen_engine
          import wfh_modules.benchmark_suite
          import wfh_modules.prince_engine
          print('All 33 module imports OK')
          "

  version-check:
    name: Version tag consistency
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify VERSION matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python -c "
          import re, sys
          with open('wfh.py') as f:
              for line in f:
                  m = re.match(r'^VERSION\s*=\s*[\"''](\d+\.\d+\.\d+)[\"'']', line)
                  if m:
                      print(m.group(1))
                      sys.exit(0)
          sys.exit(1)
          ")
          echo "Tag version:  $TAG"
          echo "Code version: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Version mismatch — tag v$TAG != code v$VERSION"
            exit 1
          fi
